openapi: "3.1.0"
info:
  title: EDO API Gateway
  version: "0.1.0"
  description: |
    BFF (Backend For Frontend) Gateway for the Electronic Document Management System.
    Handles session management, Keycloak auth, and proxies requests to microservices via gRPC.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: health
    description: Service health checks
  - name: auth
    description: Authentication and session management (OAuth2 Authorization Code + PKCE via Keycloak)
  - name: documents
    description: EDMS document and workflow operations
  - name: signatures
    description: EDMS legally binding signature operations

paths:
  /api/documents:
    post:
      tags: [documents]
      summary: Create document draft
      operationId: createDocumentDraft
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Draft document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
    get:
      tags: [documents]
      summary: Search documents
      operationId: searchDocuments
      description: Backward-compatible route; provider transitions from draft service to search-notification-service.
      x-migration-wave: wave-4-search-notification-service
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentResponse"

  /api/tasks:
    post:
      tags: [documents]
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/tasks/{taskId}/status:
    patch:
      tags: [documents]
      summary: Update task status
      operationId: updateTaskStatus
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/tasks/{taskId}/attachments:
    post:
      tags: [documents]
      summary: Add attachments to a task
      operationId: addTaskAttachments
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTaskAttachmentsRequest"
      responses:
        "200":
          description: Attachments added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTaskAttachmentsResponse"

  /api/tasks/{taskId}/attachments/{documentId}:
    delete:
      tags: [documents]
      summary: Remove a document attachment from a task
      operationId: removeTaskAttachment
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Attachment removed

  /api/tasks/available-approvers:
    get:
      tags: [documents]
      summary: List available approvers
      operationId: getAvailableApprovers
      parameters:
        - in: query
          name: boardId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Available approvers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableApproversResponse"

  /api/tasks/available-documents:
    get:
      tags: [documents]
      summary: List available documents for task attachments
      operationId: getAvailableDocuments
      parameters:
        - in: query
          name: boardId
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Available documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableDocumentsResponse"

  /api/boards:
    post:
      tags: [documents]
      summary: Create a task board
      operationId: createTaskBoard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBoardRequest"
      responses:
        "201":
          description: Task board created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTaskBoardResponse"
        "400":
          description: Invalid board request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [documents]
      summary: List task boards for an organization
      operationId: listTaskBoards
      parameters:
        - in: query
          name: organizationId
          required: true
          schema:
            type: string
          description: Organization identifier
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of boards to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: Number of boards to skip
      responses:
        "200":
          description: List of task boards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBoardsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/boards/{boardId}:
    get:
      tags: [documents]
      summary: Get detailed information about a task board
      operationId: getTaskBoard
      parameters:
        - in: path
          name: boardId
          required: true
          schema:
            type: string
          description: Board identifier
      responses:
        "200":
          description: Task board details with tasks and available resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBoardDetailsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Board not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/workflow/submit:
    post:
      tags: [documents]
      summary: Submit document into workflow
      operationId: submitWorkflow
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Workflow started

  /api/documents/{documentId}:
    patch:
      tags: [documents]
      summary: Update document draft
      operationId: updateDocumentDraft
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentRequest"
      responses:
        "200":
          description: Draft document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          description: Invalid update request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentConflictResponse"
        "503":
          description: Downstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/editor-control-profiles/{contextType}/{contextKey}:
    get:
      tags: [documents]
      summary: Get effective editor control profile
      operationId: getEditorControlProfile
      parameters:
        - in: path
          name: contextType
          required: true
          schema:
            $ref: "#/components/schemas/EditorContextType"
        - in: path
          name: contextKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Editor control profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditorControlProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/editor-control-profiles/{profileId}:
    put:
      tags: [documents]
      summary: Update editor control profile
      operationId: updateEditorControlProfile
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEditorControlProfileRequest"
      responses:
        "200":
          description: Updated editor control profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditorControlProfileResponse"
        "400":
          description: Invalid profile request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports:
    post:
      tags: [documents]
      summary: Create export request
      operationId: createExportRequest
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "202":
          description: Export request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRequestResponse"
        "409":
          description: Document version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentConflictResponse"
        "422":
          description: Unsupported document content for format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports/{exportRequestId}:
    get:
      tags: [documents]
      summary: Get export request status
      operationId: getExportRequest
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: exportRequestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRequestResponse"
        "404":
          description: Export request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports/{exportRequestId}/download:
    get:
      tags: [documents]
      summary: Download export artifact
      operationId: downloadExportArtifact
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: exportRequestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "302":
          description: Redirect to presigned object-storage URL for direct download
          headers:
            Location:
              description: Presigned URL of the export artifact
              schema:
                type: string
                format: uri
        "409":
          description: Export request is not completed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/workflow/approve:
    post:
      tags: [documents]
      summary: Approve workflow step
      operationId: approveWorkflowStep
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Approval accepted

  /api/documents/{documentId}/signatures:
    post:
      tags: [signatures]
      summary: Start signature request
      operationId: createSignatureRequest
      description: Routed via gateway to signature-service during migration wave 3.
      x-migration-wave: wave-3-signature-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSignatureRequest"
      responses:
        "202":
          description: Signature request created

  /api/search/documents:
    get:
      tags: [documents]
      summary: Search documents using projection service
      operationId: searchDocumentsProjection
      description: Routed via gateway to search-notification-service during migration wave 4.
      x-migration-wave: wave-4-search-notification-service
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Search results from projection index
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentResponse"

  /api/search/notifications/center:
    get:
      tags: [documents]
      summary: Get notification center feed
      operationId: getNotificationCenter
      description: Routed via gateway to search-notification-service for notification read model.
      x-migration-wave: wave-4-search-notification-service
      responses:
        "200":
          description: Notification center feed
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationCenterItem"

  /api/auth/login:
    get:
      tags: [auth]
      summary: Initiate OAuth2 login
      description: |
        Generates PKCE code verifier + challenge, stores them in the server-side session,
        and redirects the browser to the Keycloak authorization endpoint.
      operationId: authLogin
      parameters:
        - in: query
          name: login_hint
          schema:
            type: string
          description: Pre-fill the email field on the Keycloak login page
      responses:
        "302":
          description: Redirect to Keycloak authorization endpoint

  /api/auth/callback:
    get:
      tags: [auth]
      summary: OAuth2 authorization code callback
      description: |
        Receives the authorization code from Keycloak, verifies the PKCE state,
        exchanges the code for tokens, stores the session, and redirects to /dashboard.
      operationId: authCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to /dashboard on success or /auth/sign-in?error=auth_failed on failure
        "400":
          description: Missing or invalid session state

  /api/auth/logout:
    get:
      tags: [auth]
      summary: Logout
      description: Destroys the server-side session and redirects to the Keycloak logout endpoint.
      operationId: authLogout
      responses:
        "302":
          description: Redirect to Keycloak end-session endpoint

  /api/auth/me:
    get:
      tags: [auth]
      summary: Get current user profile
      description: Returns the authenticated user's profile from the active session.
      operationId: authMe
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: No active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/register:
    get:
      tags: [auth]
      summary: Initiate registration
      description: Redirects the browser to the Keycloak self-registration page.
      operationId: authRegister
      responses:
        "302":
          description: Redirect to Keycloak registration endpoint

  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    UserProfile:
      type: object
      required: [userName, userId, email, roles]
      properties:
        userId:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        userName:
          type: string
          example: "Alex Petrov"
        email:
          type: string
          format: email
          example: "user@example.com"
        roles:
          type: array
          items:
            type: string
          example: ["user"]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Unauthorized"

    CreateDocumentRequest:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        category:
          type: string
          enum: [HR, FINANCE, GENERAL]

    UpdateDocumentRequest:
      type: object
      required: [title, expectedVersion]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        expectedVersion:
          type: integer
          minimum: 1
        contentDocument:
          type: object
          additionalProperties: true

    EditorContextType:
      type: string
      enum: [CATEGORY, TEMPLATE]

    UpdateEditorControlProfileRequest:
      type: object
      required: [enabledControls, disabledControls, isActive]
      properties:
        enabledControls:
          type: array
          items:
            type: string
        disabledControls:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    EditorControlProfileResponse:
      type: object
      required: [id, contextType, contextKey, enabledControls, disabledControls, isActive, updatedByUserId, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        contextType:
          $ref: "#/components/schemas/EditorContextType"
        contextKey:
          type: string
        enabledControls:
          type: array
          items:
            type: string
        disabledControls:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        updatedByUserId:
          type: string
        updatedAt:
          type: string
          format: date-time

    ExportFormat:
      type: string
      enum: [PDF, DOCX]

    CreateExportRequest:
      type: object
      required: [format, sourceVersion]
      properties:
        format:
          $ref: "#/components/schemas/ExportFormat"
        sourceVersion:
          type: integer
          minimum: 1

    ExportRequestStatus:
      type: string
      enum: [DRAFT, IN_REVIEW, APPROVED, ARCHIVED]

    ExportArtifactResponse:
      type: object
      required: [id, fileName, mimeType, sizeBytes, createdAt]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time

    ExportRequestResponse:
      type: object
      required: [id, documentId, format, sourceVersion, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        format:
          $ref: "#/components/schemas/ExportFormat"
        sourceVersion:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/ExportRequestStatus"
        errorCode:
          type: string
        errorMessage:
          type: string
        artifact:
          $ref: "#/components/schemas/ExportArtifactResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSignatureRequest:
      type: object
      required: [signers]
      properties:
        signers:
          type: array
          minItems: 1
          items:
            type: object
            required: [userId]
            properties:
              userId:
                type: string
              dueAt:
                type: string
                format: date-time

    DocumentResponse:
      type: object
      required: [id, title, category, status, version, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        status:
          type: string
        contentDocument:
          type: object
          additionalProperties: true
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time

    DocumentConflictResponse:
      type: object
      required: [error, code, expectedVersion, currentVersion]
      properties:
        error:
          type: string
        code:
          type: string
          enum: [VERSION_CONFLICT]
        expectedVersion:
          type: integer
          minimum: 1
        currentVersion:
          type: integer
          minimum: 1

    NotificationCenterItem:
      type: object
      required: [id, eventType, recipientUserId, documentId, deliveryStatus, createdAt]
      properties:
        id:
          type: string
        eventType:
          type: string
        recipientUserId:
          type: string
        documentId:
          type: string
        deliveryStatus:
          type: string
          enum: [PENDING, SENT, FAILED, RETRYING]
        createdAt:
          type: string
          format: date-time

    # Task Orchestration Schemas
    TaskType:
      type: string
      enum: [approval, general]
      description: Type of task - general tasks or those requiring approval

    TaskStatus:
      type: string
      enum: [pending, in_review, approved, declined]
      description: Current status of the task in the workflow

    TaskDecision:
      type: string
      enum: [approved, declined]
      description: Decision made by the approver

    KanbanTaskGroupBy:
      type: string
      enum: [assignee, department, group]
      description: How to group tasks in the Kanban view

    CreateTaskRequest:
      type: object
      required: [boardId, title, assigneeId, assigneeName, taskType]
      properties:
        boardId:
          type: string
          description: Board identifier where the task will be created
        title:
          type: string
          minLength: 3
          maxLength: 200
          description: Task title
        description:
          type: string
          maxLength: 2000
          description: Optional task description
        assigneeId:
          type: string
          description: ID of the user assigned to the task
        assigneeName:
          type: string
          description: Display name of the assigned user
        approverId:
          type: string
          description: ID of the user who can approve (required for approval tasks)
        approverName:
          type: string
          description: Display name of the approver
        taskType:
          $ref: "#/components/schemas/TaskType"
        dueDate:
          type: string
          format: date
          description: Optional due date for the task
        priority:
          type: integer
          minimum: 1
          maximum: 5
          description: Task priority (1=lowest, 5=highest)
        attachmentIds:
          type: array
          items:
            type: string
          description: IDs of documents to attach to the task

    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
        decision:
          $ref: "#/components/schemas/TaskDecision"
        decisionComment:
          type: string
          maxLength: 1000
          description: Optional comment from the approver

    TaskAttachment:
      type: object
      required: [documentId, title, category, status]
      properties:
        documentId:
          type: string
          description: Document identifier
        title:
          type: string
          description: Document title
        category:
          type: string
          enum: [HR, FINANCE, GENERAL]
          description: Document category
        status:
          type: string
          enum: [IN_REVIEW, DRAFT, ARCHIVED, APPROVED]
          description: Document status

    TaskComment:
      type: object
      required: [id, authorId, authorName, text, createdAtLabel]
      properties:
        id:
          type: string
          description: Comment identifier
        authorId:
          type: string
          description: Author user ID
        authorName:
          type: string
          description: Author display name
        text:
          type: string
          description: Comment text
        createdAtLabel:
          type: string
          description: Human-readable creation timestamp

    KanbanTask:
      type: object
      required: [id, title, status, assigneeId, assigneeName, department, groupId, groupName, dueDateLabel, comments, creatorId, creatorName, attachments, taskType, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Task identifier
        title:
          type: string
          description: Task title
        description:
          type: string
          description: Task description
        status:
          $ref: "#/components/schemas/TaskStatus"
        assigneeId:
          type: string
          nullable: true
          description: Assigned user ID
        assigneeName:
          type: string
          description: Assigned user display name
        department:
          type: string
          description: User's department
        groupId:
          type: string
          description: Task group identifier
        groupName:
          type: string
          description: Task group display name
        dueDateLabel:
          type: string
          description: Human-readable due date
        comments:
          type: array
          items:
            $ref: "#/components/schemas/TaskComment"
        creatorId:
          type: string
          description: User who created the task
        creatorName:
          type: string
          description: Creator display name
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/TaskAttachment"
        approverId:
          type: string
          nullable: true
          description: Approver user ID
        approverName:
          type: string
          nullable: true
          description: Approver display name
        taskType:
          $ref: "#/components/schemas/TaskType"
        decision:
          $ref: "#/components/schemas/TaskDecision"
          nullable: true
        decisionComment:
          type: string
          nullable: true
          description: Approver's decision comment
        createdAt:
          type: string
          format: date-time
          description: Task creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Task last update timestamp

    TaskResponse:
      type: object
      required: [id, title, status, assigneeId, assigneeName, department, groupId, groupName, dueDateLabel, comments, creatorId, creatorName, attachments, taskType, createdAt, updatedAt]
      properties:
        $ref: "#/components/schemas/KanbanTask"

    KanbanBoardMember:
      type: object
      required: [id, fullName, department]
      properties:
        id:
          type: string
          description: User identifier
        fullName:
          type: string
          description: User's full name
        department:
          type: string
          description: User's department

    KanbanBoardSummary:
      type: object
      required: [id, organizationId, name, description, membersCount, tasksCount]
      properties:
        id:
          type: string
          description: Board identifier
        organizationId:
          type: string
          description: Organization identifier
        name:
          type: string
          description: Board display name
        description:
          type: string
          description: Board description
        membersCount:
          type: integer
          minimum: 0
          description: Number of board members
        tasksCount:
          type: integer
          minimum: 0
          description: Number of tasks on the board

    TaskBoardsResponse:
      type: object
      required: [boards, total, page, pageSize]
      properties:
        boards:
          type: array
          items:
            $ref: "#/components/schemas/KanbanBoardSummary"
        total:
          type: integer
          minimum: 0
          description: Total number of boards
        page:
          type: integer
          minimum: 0
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Number of boards per page

    CreateTaskBoardRequest:
      type: object
      required: [organizationId, name]
      properties:
        organizationId:
          type: string
          description: Organization identifier
        name:
          type: string
          minLength: 3
          maxLength: 200
          description: Board display name
        description:
          type: string
          description: Optional board description

    CreateTaskBoardResponse:
      type: object
      required: [board]
      properties:
        board:
          $ref: "#/components/schemas/KanbanBoardSummary"

    AvailableApproverItem:
      type: object
      required: [userId, userName]
      properties:
        userId:
          type: string
          description: User identifier
        userName:
          type: string
          description: User display name

    AvailableApproversResponse:
      type: array
      items:
        $ref: "#/components/schemas/AvailableApproverItem"

    AvailableDocumentItem:
      type: object
      required: [documentId, title, category]
      properties:
        documentId:
          type: string
          description: Document identifier
        title:
          type: string
          description: Document title
        category:
          type: string
          enum: [HR, FINANCE, GENERAL]
          description: Document category

    AvailableDocumentsResponse:
      type: object
      required: [documents, limit, offset]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/AvailableDocumentItem"
        limit:
          type: integer
          description: Requested limit
        offset:
          type: integer
          description: Requested offset

    TaskBoardDetailsResponse:
      type: object
      required: [id, organizationId, name, description, allowedGrouping, members, tasks, availableApprovers, availableDocuments]
      properties:
        id:
          type: string
          description: Board identifier
        organizationId:
          type: string
          description: Organization identifier
        name:
          type: string
          description: Board display name
        description:
          type: string
          description: Board description
        allowedGrouping:
          type: array
          items:
            $ref: "#/components/schemas/KanbanTaskGroupBy"
          description: Allowed grouping options for this board
        members:
          type: array
          items:
            $ref: "#/components/schemas/KanbanBoardMember"
          description: Board members
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/KanbanTask"
          description: Tasks on the board
        availableApprovers:
          type: array
          items:
            $ref: "#/components/schemas/AvailableApproverItem"
          description: Users who can be selected as approvers
        availableDocuments:
          type: array
          items:
            $ref: "#/components/schemas/AvailableDocumentItem"
          description: Documents available for attachment

    AddTaskAttachmentsRequest:
      type: object
      required: [documentIds]
      properties:
        documentIds:
          type: array
          items:
            type: string
          minItems: 1
          description: Document IDs to attach

    AddTaskAttachmentsResponse:
      type: object
      required: [attachedDocuments]
      properties:
        attachedDocuments:
          type: array
          items:
            $ref: "#/components/schemas/TaskAttachment"
          description: Successfully attached documents

  securitySchemes:
    keycloak:
      type: openIdConnect
      openIdConnectUrl: http://localhost:8080/realms/edo/.well-known/openid-configuration
    sessionCookie:
      type: apiKey
      in: cookie
      name: sessionId
