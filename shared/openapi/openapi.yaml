openapi: "3.1.0"
info:
  title: EDO API Gateway
  version: "0.1.0"
  description: |
    BFF (Backend For Frontend) Gateway for the Electronic Document Management System.
    Handles session management, Keycloak auth, and proxies requests to microservices via gRPC.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: health
    description: Service health checks
  - name: auth
    description: Authentication and session management (OAuth2 Authorization Code + PKCE via Keycloak)
  - name: documents
    description: EDMS document and workflow operations
  - name: signatures
    description: EDMS legally binding signature operations
  - name: audit
    description: EDMS audit trail operations

paths:
  /api/documents:
    post:
      tags: [documents]
      summary: Create document draft
      operationId: createDocumentDraft
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Draft document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
    get:
      tags: [documents]
      summary: Search documents
      operationId: searchDocuments
      description: Backward-compatible route; provider transitions from draft service to search-notification-service.
      x-migration-wave: wave-4-search-notification-service
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentResponse"

  /api/documents/{documentId}/workflow/submit:
    post:
      tags: [documents]
      summary: Submit document into workflow
      operationId: submitWorkflow
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Workflow started

  /api/documents/{documentId}:
    patch:
      tags: [documents]
      summary: Update document draft
      operationId: updateDocumentDraft
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentRequest"
      responses:
        "200":
          description: Draft document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          description: Invalid update request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentConflictResponse"
        "503":
          description: Downstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/editor-control-profiles/{contextType}/{contextKey}:
    get:
      tags: [documents]
      summary: Get effective editor control profile
      operationId: getEditorControlProfile
      parameters:
        - in: path
          name: contextType
          required: true
          schema:
            $ref: "#/components/schemas/EditorContextType"
        - in: path
          name: contextKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Editor control profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditorControlProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/editor-control-profiles/{profileId}:
    put:
      tags: [documents]
      summary: Update editor control profile
      operationId: updateEditorControlProfile
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEditorControlProfileRequest"
      responses:
        "200":
          description: Updated editor control profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditorControlProfileResponse"
        "400":
          description: Invalid profile request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports:
    post:
      tags: [documents]
      summary: Create export request
      operationId: createExportRequest
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "202":
          description: Export request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRequestResponse"
        "409":
          description: Document version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentConflictResponse"
        "422":
          description: Unsupported document content for format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports/{exportRequestId}:
    get:
      tags: [documents]
      summary: Get export request status
      operationId: getExportRequest
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: exportRequestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRequestResponse"
        "404":
          description: Export request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/exports/{exportRequestId}/download:
    get:
      tags: [documents]
      summary: Download export artifact
      operationId: downloadExportArtifact
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: exportRequestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "302":
          description: Redirect to presigned object-storage URL for direct download
          headers:
            Location:
              description: Presigned URL of the export artifact
              schema:
                type: string
                format: uri
        "409":
          description: Export request is not completed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{documentId}/workflow/approve:
    post:
      tags: [documents]
      summary: Approve workflow step
      operationId: approveWorkflowStep
      description: Routed via gateway to document-service during migration wave 1.
      x-migration-wave: wave-1-document-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Approval accepted

  /api/documents/{documentId}/signatures:
    post:
      tags: [signatures]
      summary: Start signature request
      operationId: createSignatureRequest
      description: Routed via gateway to signature-service during migration wave 3.
      x-migration-wave: wave-3-signature-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSignatureRequest"
      responses:
        "202":
          description: Signature request created

  /api/documents/{documentId}/audit-events:
    get:
      tags: [audit]
      summary: Get document audit events
      operationId: getDocumentAuditEvents
      description: Routed via gateway to authorization-audit-service during migration wave 2.
      x-migration-wave: wave-2-authorization-audit-service
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document audit events
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEventResponse"

  /api/search/documents:
    get:
      tags: [documents]
      summary: Search documents using projection service
      operationId: searchDocumentsProjection
      description: Routed via gateway to search-notification-service during migration wave 4.
      x-migration-wave: wave-4-search-notification-service
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Search results from projection index
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentResponse"

  /api/search/notifications/center:
    get:
      tags: [audit]
      summary: Get notification center feed
      operationId: getNotificationCenter
      description: Routed via gateway to search-notification-service for notification read model.
      x-migration-wave: wave-4-search-notification-service
      responses:
        "200":
          description: Notification center feed
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationCenterItem"

  /api/auth/login:
    get:
      tags: [auth]
      summary: Initiate OAuth2 login
      description: |
        Generates PKCE code verifier + challenge, stores them in the server-side session,
        and redirects the browser to the Keycloak authorization endpoint.
      operationId: authLogin
      parameters:
        - in: query
          name: login_hint
          schema:
            type: string
          description: Pre-fill the email field on the Keycloak login page
      responses:
        "302":
          description: Redirect to Keycloak authorization endpoint

  /api/auth/callback:
    get:
      tags: [auth]
      summary: OAuth2 authorization code callback
      description: |
        Receives the authorization code from Keycloak, verifies the PKCE state,
        exchanges the code for tokens, stores the session, and redirects to /dashboard.
      operationId: authCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to /dashboard on success or /auth/sign-in?error=auth_failed on failure
        "400":
          description: Missing or invalid session state

  /api/auth/logout:
    get:
      tags: [auth]
      summary: Logout
      description: Destroys the server-side session and redirects to the Keycloak logout endpoint.
      operationId: authLogout
      responses:
        "302":
          description: Redirect to Keycloak end-session endpoint

  /api/auth/me:
    get:
      tags: [auth]
      summary: Get current user profile
      description: Returns the authenticated user's profile from the active session.
      operationId: authMe
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: No active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/register:
    get:
      tags: [auth]
      summary: Initiate registration
      description: Redirects the browser to the Keycloak self-registration page.
      operationId: authRegister
      responses:
        "302":
          description: Redirect to Keycloak registration endpoint

  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    UserProfile:
      type: object
      required: [userId, email, roles]
      properties:
        userId:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        email:
          type: string
          format: email
          example: "user@example.com"
        roles:
          type: array
          items:
            type: string
          example: ["user"]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Unauthorized"

    CreateDocumentRequest:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        category:
          type: string
          enum: [HR, FINANCE, GENERAL]

    UpdateDocumentRequest:
      type: object
      required: [title, expectedVersion]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        expectedVersion:
          type: integer
          minimum: 1
        contentDocument:
          type: object
          additionalProperties: true

    EditorContextType:
      type: string
      enum: [CATEGORY, TEMPLATE]

    UpdateEditorControlProfileRequest:
      type: object
      required: [enabledControls, disabledControls, isActive]
      properties:
        enabledControls:
          type: array
          items:
            type: string
        disabledControls:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    EditorControlProfileResponse:
      type: object
      required: [id, contextType, contextKey, enabledControls, disabledControls, isActive, updatedByUserId, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        contextType:
          $ref: "#/components/schemas/EditorContextType"
        contextKey:
          type: string
        enabledControls:
          type: array
          items:
            type: string
        disabledControls:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        updatedByUserId:
          type: string
        updatedAt:
          type: string
          format: date-time

    ExportFormat:
      type: string
      enum: [PDF, DOCX]

    CreateExportRequest:
      type: object
      required: [format, sourceVersion]
      properties:
        format:
          $ref: "#/components/schemas/ExportFormat"
        sourceVersion:
          type: integer
          minimum: 1

    ExportRequestStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED]

    ExportArtifactResponse:
      type: object
      required: [id, fileName, mimeType, sizeBytes, createdAt]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time

    ExportRequestResponse:
      type: object
      required: [id, documentId, format, sourceVersion, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        format:
          $ref: "#/components/schemas/ExportFormat"
        sourceVersion:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/ExportRequestStatus"
        errorCode:
          type: string
        errorMessage:
          type: string
        artifact:
          $ref: "#/components/schemas/ExportArtifactResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSignatureRequest:
      type: object
      required: [signers]
      properties:
        signers:
          type: array
          minItems: 1
          items:
            type: object
            required: [userId]
            properties:
              userId:
                type: string
              dueAt:
                type: string
                format: date-time

    DocumentResponse:
      type: object
      required: [id, title, category, status, version, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        status:
          type: string
        contentDocument:
          type: object
          additionalProperties: true
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time

    DocumentConflictResponse:
      type: object
      required: [error, code, expectedVersion, currentVersion]
      properties:
        error:
          type: string
        code:
          type: string
          enum: [VERSION_CONFLICT]
        expectedVersion:
          type: integer
          minimum: 1
        currentVersion:
          type: integer
          minimum: 1

    AuditEventResponse:
      type: object
      required: [id, actionType, outcome, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        actionType:
          type: string
        outcome:
          type: string
          enum: [SUCCESS, DENIED, FAILED]
        occurredAt:
          type: string
          format: date-time

    NotificationCenterItem:
      type: object
      required: [id, eventType, recipientUserId, documentId, deliveryStatus, createdAt]
      properties:
        id:
          type: string
        eventType:
          type: string
        recipientUserId:
          type: string
        documentId:
          type: string
        deliveryStatus:
          type: string
          enum: [PENDING, SENT, FAILED, RETRYING]
        createdAt:
          type: string
          format: date-time

  securitySchemes:
    keycloak:
      type: openIdConnect
      openIdConnectUrl: http://localhost:8080/realms/edo/.well-known/openid-configuration
    sessionCookie:
      type: apiKey
      in: cookie
      name: sessionId
