syntax = "proto3";

package service.v1;

option go_package = "edo/services/service/internal/adapters/inbound/grpc/pb;pb";

// ExampleService is a placeholder — rename and extend per domain.
service ExampleService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}
