syntax = "proto3";

package service.v1;

option go_package = "edo/shared/proto/pb;pb";

// ExampleService is a placeholder — rename and extend per domain.
service ExampleService {
  rpc Ping(PingRequest) returns (PingResponse);
}

service DocumentWorkflowService {
  rpc CreateDraft(CreateDraftRequest) returns (Document);
  rpc UpdateDraft(UpdateDraftRequest) returns (Document);
  rpc GetDocument(GetDocumentRequest) returns (Document);
  rpc GetEditorControlProfile(GetEditorControlProfileRequest) returns (EditorControlProfile);
  rpc UpdateEditorControlProfile(UpdateEditorControlProfileRequest) returns (EditorControlProfile);
  rpc CreateExportRequest(CreateExportPayload) returns (ExportRequest);
  rpc GetExportRequest(GetExportRequestRequest) returns (ExportRequest);
  rpc DownloadExportArtifact(DownloadExportArtifactRequest) returns (DownloadExportArtifactResponse);
  rpc SearchDocuments(SearchDocumentsRequest) returns (SearchDocumentsResponse);
  rpc SubmitWorkflow(SubmitWorkflowRequest) returns (WorkflowInstance);
  rpc ApproveWorkflow(ApproveWorkflowRequest) returns (WorkflowInstance);
  rpc RequestWorkflowChanges(RequestWorkflowChangesRequest) returns (WorkflowInstance);
  rpc ArchiveDocument(ArchiveDocumentRequest) returns (ArchiveDocumentResponse);
}

service SearchNotificationService {
  rpc SyncSearchProjection(SyncSearchProjectionRequest) returns (SyncSearchProjectionResponse);
  rpc SearchDocuments(SearchDocumentsRequest) returns (SearchDocumentsResponse);
  rpc EmitNotification(EmitNotificationRequest) returns (EmitNotificationResponse);
  rpc RetryFailedNotifications(RetryFailedNotificationsRequest) returns (RetryFailedNotificationsResponse);
}

service DocumentService {
  rpc CreateDraft(CreateDraftRequest) returns (Document);
  rpc UpdateDraft(UpdateDraftRequest) returns (Document);
  rpc GetDocument(GetDocumentRequest) returns (Document);
  rpc GetEditorControlProfile(GetEditorControlProfileRequest) returns (EditorControlProfile);
  rpc UpdateEditorControlProfile(UpdateEditorControlProfileRequest) returns (EditorControlProfile);
  rpc CreateExportRequest(CreateExportPayload) returns (ExportRequest);
  rpc GetExportRequest(GetExportRequestRequest) returns (ExportRequest);
  rpc DownloadExportArtifact(DownloadExportArtifactRequest) returns (DownloadExportArtifactResponse);
  rpc SearchDocuments(SearchDocumentsRequest) returns (SearchDocumentsResponse);
  rpc ArchiveDocument(ArchiveDocumentRequest) returns (ArchiveDocumentResponse);
}

service WorkflowService {
  rpc StartWorkflow(StartWorkflowRequest) returns (WorkflowInstance);
  rpc ApproveStep(ApproveStepRequest) returns (WorkflowInstance);
  rpc RejectStep(RejectStepRequest) returns (WorkflowInstance);
  rpc RequestChanges(RequestChangesRequest) returns (WorkflowInstance);
}

service SignatureService {
  rpc StartSignature(StartSignatureRequest) returns (SignatureRequest);
  rpc RecordSignatureCallback(RecordSignatureCallbackRequest) returns (SignatureRequest);
  rpc GetSignatureStatus(GetSignatureStatusRequest) returns (SignatureRequest);
}

service NotificationService {
  rpc EmitNotification(EmitNotificationRequest) returns (EmitNotificationResponse);
  rpc RetryFailedNotifications(RetryFailedNotificationsRequest) returns (RetryFailedNotificationsResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}

message Document {
  string id = 1;
  string title = 2;
  string category = 3;
  string status = 4;
  string owner_user_id = 5;
  int64 version = 6;
  string updated_at = 7;
  string content_document_json = 8;
  string owner_user_name = 9;
}

message EditorControlProfile {
  string id = 1;
  string context_type = 2;
  string context_key = 3;
  repeated string enabled_controls = 4;
  repeated string disabled_controls = 5;
  bool is_active = 6;
  string updated_by_user_id = 7;
  string updated_at = 8;
}

message ExportArtifact {
  string id = 1;
  string file_name = 2;
  string mime_type = 3;
  int64 size_bytes = 4;
  string created_at = 5;
}

message ExportRequest {
  string id = 1;
  string document_id = 2;
  string format = 3;
  int64 source_version = 4;
  string status = 5;
  string error_code = 6;
  string error_message = 7;
  ExportArtifact artifact = 8;
  string created_at = 9;
  string updated_at = 10;
}

message WorkflowInstance {
  string id = 1;
  string document_id = 2;
  string current_step_code = 3;
  string status = 4;
  string assigned_user_id = 5;
  string updated_at = 6;
}

message BoardMember {
  string id = 1;
  string full_name = 2;
  string department = 3;
  string email = 4;
}

message TaskAttachment {
  string document_id = 1;
  string title = 2;
  string category = 3;
  string status = 4;
}

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string task_type = 5;
  string creator_user_id = 6;
  string creator_user_name = 7;
  string assignee_user_id = 8;
  string assignee_user_name = 9;
  string approver_user_id = 10;
  string approver_user_name = 11;
  string decision = 12;
  string decision_comment = 13;
  string due_date = 14;
  repeated TaskAttachment attachments = 15;
  string created_at = 16;
  string updated_at = 17;
}

message CreateTaskRequest {
  string actor_user_id = 1;
  string board_id = 2;
  string title = 3;
  string description = 4;
  string assignee_user_id = 5;
  string approver_user_id = 6;
  string task_type = 7;
  repeated string attachment_document_ids = 8;
  string due_date = 9;
}

message CreateTaskResponse {
  Task task = 1;
}

message UpdateTaskStatusRequest {
  string actor_user_id = 1;
  string task_id = 2;
  string status = 3;
  string decision_comment = 4;
}

message UpdateTaskStatusResponse {
  Task task = 1;
}

message AddTaskAttachmentsRequest {
  string actor_user_id = 1;
  string task_id = 2;
  repeated TaskAttachment attachments = 3;
}

message AddTaskAttachmentsResponse {
  repeated TaskAttachment attachments = 1;
}

message RemoveTaskAttachmentRequest {
  string actor_user_id = 1;
  string task_id = 2;
  string document_id = 3;
}

message GetTaskBoardRequest {
  string actor_user_id = 1;
  string board_id = 2;
}

message CreateTaskBoardRequest {
  string actor_user_id = 1;
  string organization_id = 2;
  string name = 3;
  string description = 4;
}

message ListTaskBoardsRequest {
  string actor_user_id = 1;
  string organization_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message TaskBoard {
  string id = 1;
  string name = 2;
  repeated BoardMember members = 3;
  repeated Task tasks = 4;
  repeated TaskAttachment available_documents = 5;
  repeated BoardMember available_approvers = 6;
  string organization_id = 7;
  string description = 8;
  repeated string allowed_grouping = 9;
}

message TaskBoardSummary {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  string description = 4;
  int32 members_count = 5;
  int32 tasks_count = 6;
}

message ListTaskBoardsResponse {
  repeated TaskBoardSummary boards = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetTaskBoardResponse {
  TaskBoard board = 1;
}

message CreateTaskBoardResponse {
  TaskBoardSummary board = 1;
}

message GetTaskDetailsRequest {
  string actor_user_id = 1;
  string task_id = 2;
}

message GetTaskDetailsResponse {
  Task task = 1;
  repeated BoardMember members = 2;
  string current_user_id = 3;
  bool can_edit = 4;
  bool can_approve = 5;
  bool can_move_to_review = 6;
}

message AvailableApproversRequest {
  string board_id = 1;
  string search = 2;
  int32 limit = 3;
}

message AvailableApproversResponse {
  repeated BoardMember items = 1;
  int32 total = 2;
}

message ListOrganizationMembersRequest {
  string actor_user_id = 1;
  string organization_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListOrganizationMembersResponse {
  repeated BoardMember items = 1;
  int32 total = 2;
}

message AddTaskBoardMemberRequest {
  string actor_user_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message AddTaskBoardMemberResponse {
  BoardMember member = 1;
}

message DocumentItem {
  string id = 1;
  string title = 2;
  string category = 3;
  string status = 4;
  string updated_at = 5;
  int32 size_kb = 6;
  int32 version = 7;
}

message AvailableDocumentsRequest {
  string board_id = 1;
  string category = 2;
  string status = 3;
  string search = 4;
  int32 limit = 5;
}

message AvailableDocumentsResponse {
  repeated DocumentItem items = 1;
  int32 total = 2;
}

service TaskOrchestrationService {
  rpc CreateTaskBoard(CreateTaskBoardRequest) returns (CreateTaskBoardResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
  rpc AddTaskAttachments(AddTaskAttachmentsRequest) returns (AddTaskAttachmentsResponse);
  rpc RemoveTaskAttachment(RemoveTaskAttachmentRequest) returns (Task);
  rpc ListTaskBoards(ListTaskBoardsRequest) returns (ListTaskBoardsResponse);
  rpc GetTaskBoard(GetTaskBoardRequest) returns (GetTaskBoardResponse);
  rpc GetTaskDetails(GetTaskDetailsRequest) returns (GetTaskDetailsResponse);
  rpc GetAvailableApprovers(AvailableApproversRequest) returns (AvailableApproversResponse);
  rpc GetAvailableDocuments(AvailableDocumentsRequest) returns (AvailableDocumentsResponse);
  rpc ListOrganizationMembers(ListOrganizationMembersRequest) returns (ListOrganizationMembersResponse);
  rpc AddTaskBoardMember(AddTaskBoardMemberRequest) returns (AddTaskBoardMemberResponse);
}

message SignatureRequest {
  string id = 1;
  string document_id = 2;
  string status = 3;
  string provider_ref = 4;
  string due_at = 5;
}

message CreateDraftRequest {
  string actor_user_id = 1;
  string title = 2;
  string category = 3;
  string content_document_json = 4;
}

message UpdateDraftRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string title = 3;
  int64 expected_version = 4;
  string content_document_json = 5;
  string status = 6;
}

message GetDocumentRequest {
  string actor_user_id = 1;
  string document_id = 2;
}

message GetEditorControlProfileRequest {
  string actor_user_id = 1;
  string context_type = 2;
  string context_key = 3;
}

message UpdateEditorControlProfileRequest {
  string actor_user_id = 1;
  string profile_id = 2;
  repeated string enabled_controls = 3;
  repeated string disabled_controls = 4;
  bool is_active = 5;
}

message CreateExportPayload {
  string actor_user_id = 1;
  string document_id = 2;
  string format = 3;
  int64 source_version = 4;
}

message GetExportRequestRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string export_request_id = 3;
}

message DownloadExportArtifactRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string export_request_id = 3;
}

message DownloadExportArtifactResponse {
  bytes data = 1;
  string file_name = 2;
  string mime_type = 3;
}

message SearchDocumentsRequest {
  string actor_user_id = 1;
  string query = 2;
  string status = 3;
  string category = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message SearchDocumentsResponse {
  repeated Document items = 1;
  int32 total = 2;
}

message ArchiveDocumentRequest {
  string actor_user_id = 1;
  string document_id = 2;
  int64 expected_version = 3;
}

message ArchiveDocumentResponse {
  bool archived = 1;
  string archived_at = 2;
}

message StartWorkflowRequest {
  string actor_user_id = 1;
  string document_id = 2;
}

message ApproveStepRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string step_code = 3;
  int64 expected_version = 4;
}

message RejectStepRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string reason = 3;
  int64 expected_version = 4;
}

message RequestChangesRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string comment = 3;
  int64 expected_version = 4;
}

message SubmitWorkflowRequest {
  string actor_user_id = 1;
  string document_id = 2;
}

message ApproveWorkflowRequest {
  string actor_user_id = 1;
  string document_id = 2;
  int64 expected_version = 3;
}

message RequestWorkflowChangesRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string comment = 3;
  int64 expected_version = 4;
}

message StartSignatureRequest {
  string actor_user_id = 1;
  string document_id = 2;
  repeated SignatureSigner signers = 3;
}

message SignatureSigner {
  string user_id = 1;
  string due_at = 2;
}

message RecordSignatureCallbackRequest {
  string actor_user_id = 1;
  string signature_request_id = 2;
  string status = 3;
  string provider_ref = 4;
}

message GetSignatureStatusRequest {
  string actor_user_id = 1;
  string document_id = 2;
}

message EmitNotificationRequest {
  string actor_user_id = 1;
  string event_type = 2;
  string recipient_user_id = 3;
  string document_id = 4;
}

message EmitNotificationResponse {
  string notification_id = 1;
}

message RetryFailedNotificationsRequest {
  string actor_user_id = 1;
  int32 batch_size = 2;
}

message RetryFailedNotificationsResponse {
  int32 retried_count = 1;
}

message SyncSearchProjectionRequest {
  string actor_user_id = 1;
  string document_id = 2;
  string version = 3;
}

message SyncSearchProjectionResponse {
  bool synced = 1;
  string indexed_at = 2;
}
