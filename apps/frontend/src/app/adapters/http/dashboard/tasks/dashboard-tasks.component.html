<edo-dogx-page-section title="Задачи" subtitle="Заглушка для проверки маршрута /dashboard/tasks">
  <edo-dogx-card title="Раздел задач" subtitle="Страница доступна и интерактивна">
    <p class="dashboard-page__text">Здесь будет реализован список задач и статусы выполнения.</p>

    <edo-dogx-button
      label="Выполнить тестовое действие"
      appearance="secondary"
      size="m"
      (pressed)="onActionPressed()"
    />

    @if (message()) {
      <p class="dashboard-page__message" aria-live="polite">{{ message() }}</p>
    }
  </edo-dogx-card>
</edo-dogx-page-section>
