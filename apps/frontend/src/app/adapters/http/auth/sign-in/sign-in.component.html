<section class="auth-page">
  <header class="auth-page__header">
    <h2 i18n="@@auth.signIn.title">Вход</h2>
    <p i18n="@@auth.signIn.subtitle">Используйте рабочую почту и пароль.</p>
  </header>

  <edo-dogx-auth-cat
    [passwordHidden]="!passwordVisible()"
    [focused]="passwordFocused()"
    [typing]="passwordTyping()"
  />

  <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()">
    <edo-dogx-input
      i18n-label="@@auth.common.emailLabel"
      label="Эл. почта"
      [control]="emailControl"
      type="email"
      autocomplete="email"
      i18n-errorText="@@auth.common.emailError"
      errorText="Введите корректный адрес электронной почты."
    />

    <div>
      <edo-dogx-password-field
        [control]="passwordControl"
        (visibilityChange)="onPasswordVisibilityChange($event)"
        (focusChange)="onPasswordFocusChange($event)"
        (typingChange)="onPasswordTypingChange($event)"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <p class="auth-form__error" i18n="@@auth.common.passwordMinError">
          Пароль должен быть не короче 8 символов.
        </p>
      }
    </div>

    @if (submitError()) {
      <p class="auth-form__error auth-form__error--submit">{{ submitError() }}</p>
    }

    <edo-dogx-button
      appearance="primary"
      size="l"
      type="submit"
      [block]="true"
      [disabled]="form.invalid || loading()"
      [loading]="loading()"
      i18n-label="@@auth.signIn.submitLabel"
      label="Войти"
      i18n-loadingLabel="@@auth.signIn.loadingLabel"
      loadingLabel="Входим..."
      class="auth-form__submit"
    />
  </form>

  <section class="social-login" i18n-aria-label="@@auth.signIn.socialAria" aria-label="Провайдеры социального входа">
    <p i18n="@@auth.signIn.socialText">Или продолжить через</p>
    <div class="social-login__buttons">
      <edo-dogx-button
        appearance="secondary"
        size="s"
        type="button"
        [block]="true"
        label="Google"
        (pressed)="onSocialClick('Google')"
      />
      <edo-dogx-button
        appearance="secondary"
        size="s"
        type="button"
        [block]="true"
        label="GitHub"
        (pressed)="onSocialClick('GitHub')"
      />
    </div>
  </section>

  <p class="auth-page__switch">
    <span i18n="@@auth.signIn.noAccount">Ещё нет аккаунта?</span>
    <a routerLink="/auth/sign-up" i18n="@@auth.signIn.createAccountLink">Создать</a>
  </p>
</section>
