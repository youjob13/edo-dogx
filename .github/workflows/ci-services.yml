name: CI — Services (Go)

on:
  push:
    paths:
      - 'services/**'
      - 'shared/proto/**'
      - 'go.work'
      - 'go.work.sum'
  pull_request:
    paths:
      - 'services/**'
      - 'shared/proto/**'
      - 'go.work'
      - 'go.work.sum'

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
