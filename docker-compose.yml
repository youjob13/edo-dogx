services:

  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edo}
      POSTGRES_USER: ${POSTGRES_USER:-edo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edo_user} -d ${POSTGRES_DB:-edo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-edo}
      KC_DB_USERNAME: ${POSTGRES_USER:-edo_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Microservices ─────────────────────────────────────────────────

  service:
    build:
      context: services/service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edo-network

  # ── Applications ──────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Keycloak is reachable inside Docker via its service name, but browsers need localhost
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      # Set to true only when serving over HTTPS
      COOKIE_SECURE: "false"
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      service:
        condition: service_started
    networks:
      - edo-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside Docker, the gateway is reachable by its service name, not localhost.
      API_BASE_URL: http://gateway:3000
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    depends_on:
      - gateway
    networks:
      - edo-network

volumes:
  postgres_data:
  redis_data:

networks:
  edo-network:
    driver: bridge
