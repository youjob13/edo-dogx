services:

  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edo}
      POSTGRES_USER: ${POSTGRES_USER:-edo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edo_user} -d ${POSTGRES_DB:-edo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-edo-exports}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET}
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - edo-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-edo}
      KC_DB_USERNAME: ${POSTGRES_USER:-edo_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edo-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Microservices ─────────────────────────────────────────────────

  document-service:
    build:
      context: services/document-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "50052:50052" 
    environment:
      GRPC_ADDR: :50052
      DOCUMENT_EXPORT_TIMEOUT_SECONDS: ${DOCUMENT_EXPORT_TIMEOUT_SECONDS:-10}
      DOCUMENT_EXPORT_MAX_CONTENT_BYTES: ${DOCUMENT_EXPORT_MAX_CONTENT_BYTES:-2097152}
      DOCUMENT_EXPORT_MAX_RETRIES: ${DOCUMENT_EXPORT_MAX_RETRIES:-2}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-edo-exports}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PRESIGNED_EXPIRY_SECONDS: ${MINIO_PRESIGNED_EXPIRY_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - edo-network

  authorization-audit-service:
    build:
      context: services/authorization-audit-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GRPC_ADDR: :50053
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edo-network

  signature-service:
    build:
      context: services/signature-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GRPC_ADDR: :50054
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edo-network

  search-notification-service:
    build:
      context: services/search-notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GRPC_ADDR: :50055
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - edo-network

  # ── Applications ──────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Keycloak is reachable inside Docker via its service name, but browsers need localhost
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      # Set to true only when serving over HTTPS
      COOKIE_SECURE: "false"
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      document-service:
        condition: service_started
      authorization-audit-service:
        condition: service_started
      signature-service:
        condition: service_started
      search-notification-service:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - edo-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside Docker, the gateway is reachable by its service name, not localhost.
      API_BASE_URL: http://gateway:3000
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    depends_on:
      - gateway
    networks:
      - edo-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  edo-network:
    driver: bridge
